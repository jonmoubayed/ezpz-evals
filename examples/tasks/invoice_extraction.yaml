name: invoice_extraction
version: "1"
type: extraction
instructions: >
  Extract billing fields from the invoice. If a field is not present in the document,
  return null rather than guessing.

# Default scorers (applied per field unless a field overrides them)
scorers:
  - name: exact

fields:
  - name: invoice_number
    type: string
    required: true
    description: The invoice identifier, often labeled "Invoice #".
    scorers: [{ name: exact }]

  - name: invoice_date
    type: date
    required: true
    description: Invoice issue date.
    scorers: [{ name: date_match, config: { tolerance_days: 0 } }]

  - name: vendor_name
    type: string
    required: true
    description: The name of the company issuing the invoice.
    scorers: [{ name: string_similarity, config: { threshold: 0.9 } }]

  - name: total_amount
    type: currency
    required: true
    description: Grand total including tax.
    scorers: [{ name: numeric_tolerance, config: { abs: 0.01 } }]

  - name: po_number
    type: string
    required: false
    description: Purchase order number, if referenced. Often absent.
    scorers: [{ name: presence }, { name: exact }]

  - name: line_items
    type: list
    required: true
    description: One entry per billed line.
    match_key: description          # align predicted rows to GT rows on this key
    item:
      name: line_item
      type: object
      fields:
        - { name: description, type: string,   scorers: [{ name: string_similarity, config: { threshold: 0.85 } }] }
        - { name: quantity,    type: number,   scorers: [{ name: numeric_tolerance, config: { abs: 0.0 } }] }
        - { name: unit_price,  type: currency, scorers: [{ name: numeric_tolerance, config: { abs: 0.01 } }] }
    scorers: [{ name: list_table }]
