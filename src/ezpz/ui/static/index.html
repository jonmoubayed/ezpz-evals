<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ezpz evals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg, #0a0b0d); color: var(--fg, #e7eaef);
         font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
         font-size: 13px; line-height: 1.4; }
  ::selection { background: oklch(0.66 0.16 250 / .3); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a2e36; border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  input[type=range] { accent-color: oklch(0.66 0.16 250); }
  button { font-family: inherit; }
  mark { background: var(--acD); color: var(--acT); border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const App = (() => {
  "use strict";

  const state = {
    theme: 'dark', view: 'leaderboard', runId: null, slice: 'all',
    selectedDoc: null, selectedField: null, failCase: 'all', diffFilter: 'all', diffBase: null,
    runMenuOpen: false, budgetOpen: false, sampleN: 50, budgetCap: 25, runJob: null,
  };
  let data = {};            // per-view fetched payloads
  let runMeta = { runs: [] };

  // ---- theme palettes (verbatim from the design) ----
  const palettes = {
    dark: {
      bg: '#0a0b0d', panel: '#0e1014', panel2: '#16181e', line: '#1d2026', line2: '#15171c',
      fg: '#e7eaef', fg2: '#99a0aa', fg3: '#5b616b', fg4: '#3a3f47',
      ac: 'oklch(0.66 0.16 250)', acT: 'oklch(0.82 0.11 250)', acD: 'oklch(0.66 0.16 250 / .15)', acL: 'oklch(0.66 0.16 250 / .38)',
      cor: 'oklch(0.72 0.15 150)', corD: 'oklch(0.72 0.15 150 / .13)', wr: 'oklch(0.68 0.2 25)', wrD: 'oklch(0.68 0.2 25 / .14)',
      mi: 'oklch(0.8 0.13 80)', miD: 'oklch(0.8 0.13 80 / .13)', ha: 'oklch(0.66 0.2 330)', haD: 'oklch(0.66 0.2 330 / .14)',
      pa: 'oklch(0.72 0.16 50)', paD: 'oklch(0.72 0.16 50 / .13)', ab: '#6b7280', nl: '#3a3f47',
    },
    light: {
      bg: '#f3f1ea', panel: '#faf9f5', panel2: '#eceae2', line: '#e0ddd3', line2: '#ebe8df',
      fg: '#1b1a16', fg2: '#5c574c', fg3: '#8a8579', fg4: '#b6b0a4',
      ac: 'oklch(0.52 0.14 255)', acT: 'oklch(0.45 0.15 255)', acD: 'oklch(0.52 0.14 255 / .1)', acL: 'oklch(0.52 0.14 255 / .32)',
      cor: 'oklch(0.5 0.14 150)', corD: 'oklch(0.5 0.14 150 / .12)', wr: 'oklch(0.52 0.2 27)', wrD: 'oklch(0.52 0.2 27 / .1)',
      mi: 'oklch(0.56 0.12 70)', miD: 'oklch(0.56 0.12 70 / .13)', ha: 'oklch(0.5 0.2 330)', haD: 'oklch(0.5 0.2 330 / .1)',
      pa: 'oklch(0.54 0.16 50)', paD: 'oklch(0.54 0.16 50 / .12)', ab: '#8a8579', nl: '#b6b0a4',
    },
  };
  const v = n => `var(--${n})`;
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  const pct1 = x => (x * 100).toFixed(1);
  const pct0 = x => (x * 100).toFixed(0);

  const caseMap = () => ({
    correct: { fg: v('cor'), bg: v('corD'), glyph: '✓', label: 'correct' },
    wrong: { fg: v('wr'), bg: v('wrD'), glyph: '✗', label: 'wrong' },
    missing: { fg: v('mi'), bg: v('miD'), glyph: '⊘', label: 'missing' },
    absent_ok: { fg: v('cor'), bg: 'transparent', glyph: '∅', label: 'absent_ok' },
    hallucinated: { fg: v('ha'), bg: v('haD'), glyph: '⚠', label: 'hallucinated' },
    parse_error: { fg: v('pa'), bg: v('paD'), glyph: '⌀', label: 'parse_error' },
    not_labeled: { fg: v('nl'), bg: 'transparent', glyph: '–', label: 'not_labeled' },
    unscored: { fg: v('fg4'), bg: 'transparent', glyph: '·', label: 'unscored' },
  });

  function applyTheme() {
    const T = palettes[state.theme];
    const root = document.documentElement;
    for (const k in T) root.style.setProperty('--' + k, T[k]);
  }

  // ---- data ----
  async function api(path, params) {
    const q = new URLSearchParams(params || {});
    const r = await fetch(path + (q.toString() ? '?' + q : ''));
    return r.json();
  }
  function curRun() { return runMeta.runs.find(r => r.id === state.runId) || runMeta.runs[0] || {}; }

  async function loadState() {
    const s = await api('/api/state');
    runMeta = s;
    if (!state.runId) state.runId = s.current;
  }
  async function loadView() {
    const run = state.runId;
    if (!run) { render(); return; }
    if (state.view === 'leaderboard') {
      data.leaderboard = await api('/api/leaderboard', { run, slice: state.slice });
      data.fields = await api('/api/fields', { run });
    } else if (state.view === 'documents') {
      data.documents = await api('/api/documents', { run });
      const docs = data.documents.docs || [];
      if (!state.selectedDoc || !docs.find(d => d.doc_id === state.selectedDoc))
        state.selectedDoc = docs.length ? docs[0].doc_id : null;
      if (state.selectedDoc) data.doc = await api('/api/doc', { run, doc: state.selectedDoc });
    } else if (state.view === 'diff') {
      data.diff = await api('/api/diff', { run, base: state.diffBase || '' });
    } else if (state.view === 'failures') {
      data.failures = await api('/api/failures', { run });
    } else if (state.view === 'analyze') {
      data.analyze = await api('/api/analyze', { run });
      data.cost = await api('/api/cost', { run });
    }
    // leaderboard rows power the budget modal; make sure they're available
    if (!data.leaderboard || data.leaderboard.run !== run)
      data.leaderboard = await api('/api/leaderboard', { run, slice: 'all' });
    render();
  }

  // ===================== TOP BAR =====================
  function topbar() {
    const r = curRun();
    const tabs = [['leaderboard', 'Leaderboard'], ['documents', 'Documents'], ['diff', 'Run diff'], ['failures', 'Failures'], ['analyze', 'Analyze']];
    const nav = tabs.map(([id, label]) => {
      const on = state.view === id;
      return `<button onclick="App.go('${id}')" style="background:transparent; color:${on ? v('fg') : v('fg3')}; border:none; border-bottom:2px solid ${on ? v('ac') : 'transparent'}; padding:7px 13px 8px; font-size:12px; font-weight:500; cursor:pointer; letter-spacing:.01em;">${label}</button>`;
    }).join('');

    return `
    <div style="position:sticky; top:0; z-index:30; background:var(--bg); border-bottom:1px solid var(--line); padding:0 22px;">
      <div style="display:flex; align-items:center; gap:18px; height:52px; max-width:1280px; margin:0 auto;">
        <div style="display:flex; align-items:baseline; gap:8px;">
          <span style="font-weight:700; font-size:15px; color:var(--ac); letter-spacing:-.02em;">ezpz</span>
          <span style="color:var(--fg3); font-size:11px;">evals</span>
        </div>
        <div style="width:1px; height:18px; background:var(--line);"></div>
        <div style="position:relative;">
          <button onclick="App.toggleRunMenu(event)" style="display:flex; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:5px 11px; font-size:11.5px; color:var(--fg3); cursor:pointer;">
            <span style="width:6px; height:6px; border-radius:50%; background:var(--cor); flex:none;"></span>
            <span style="color:var(--fg2);">${esc(r.ds || '—')}</span><span style="color:var(--fg4);">·</span>
            <span>run <span style="color:var(--fg);">${esc((r.id || '').slice(0, 7) || '—')}</span></span><span style="color:var(--fg4);">·</span>
            <span>${r.n || 0} docs</span><span style="color:var(--fg3); font-size:8px; margin-left:1px;">▼</span>
          </button>
          ${state.runMenuOpen ? runMenu() : ''}
        </div>
        <nav style="display:flex; gap:2px; margin-left:14px;">${nav}</nav>
        <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
          <a href="/api/export?run=${encodeURIComponent(r.id || '')}" title="download run JSON" style="display:flex; align-items:center; justify-content:center; background:var(--panel2); color:var(--fg2); border:1px solid var(--line); border-radius:5px; width:30px; height:30px; font-size:13px; cursor:pointer; text-decoration:none;">⤓</a>
          <button onclick="App.openBudget()" style="display:flex; align-items:center; gap:6px; background:var(--acD); color:var(--acT); border:1px solid var(--acL); border-radius:5px; padding:6px 11px; font-size:11.5px; font-weight:600; cursor:pointer;"><span style="font-size:13px; line-height:1;">▸</span> run</button>
          <button onclick="App.toggleTheme()" title="toggle theme" style="background:var(--panel2); color:var(--fg2); border:1px solid var(--line); border-radius:5px; width:30px; height:30px; font-size:13px; cursor:pointer;">${state.theme === 'dark' ? '☀' : '☾'}</button>
        </div>
      </div>
    </div>`;
  }

  function runMenu() {
    const rows = (runMeta.runs || []).map(r => {
      const sel = r.id === state.runId;
      return `<div onclick="App.selectRun('${r.id}')" style="display:grid; grid-template-columns:1fr auto; gap:3px 10px; padding:10px 13px; border-bottom:1px solid var(--line2); cursor:pointer; background:${sel ? v('acD') : 'transparent'}; border-left:2px solid ${sel ? v('ac') : 'transparent'};">
        <div style="display:flex; align-items:center; gap:7px; min-width:0;">
          <span style="width:5px; height:5px; border-radius:50%; background:${sel ? v('cor') : v('fg4')}; flex:none;"></span>
          <span style="font-size:12px; color:var(--fg); font-weight:600;">${esc(r.id.slice(0, 7))}</span>
          <span style="font-size:10px; color:var(--fg4); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(r.note)}</span>
        </div>
        <div style="text-align:right; font-size:12px; color:var(--cor); font-weight:600; font-variant-numeric:tabular-nums;">${pct1(r.acc)}%</div>
        <div style="font-size:10px; color:var(--fg3);">${esc(r.ds)} · ${r.n} docs</div>
        <div style="text-align:right; font-size:10px; color:var(--fg4); font-variant-numeric:tabular-nums;">${esc(r.ago)} · $${(r.cost || 0).toFixed(2)}</div>
      </div>`;
    }).join('');
    return `
      <div onclick="App.closeRunMenu()" style="position:fixed; inset:0; z-index:39;"></div>
      <div style="position:absolute; top:38px; left:0; z-index:40; width:380px; background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 18px 50px rgba(0,0,0,.45); overflow:hidden;">
        <div style="display:flex; justify-content:space-between; padding:9px 13px; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--fg3); border-bottom:1px solid var(--line);">
          <span>recent runs</span><span style="color:var(--fg4);">newest first</span>
        </div>
        ${rows || '<div style="padding:14px; color:var(--fg3); font-size:11px;">no runs yet</div>'}
        <div onclick="App.openBudget()" style="padding:10px 13px; font-size:11px; color:var(--acT); background:var(--acD); cursor:pointer; display:flex; align-items:center; gap:7px;"><span style="font-size:13px; line-height:1;">+</span> estimate a new run…</div>
      </div>`;
  }

  function cliBar() {
    // real, copy-pasteable commands that produce the equivalent output (the viewer reads SQLite;
    // these CLI verbs read the same DB). Leaderboard ≈ the matrix `score` re-prints (free).
    const r = state.runId || '';
    const base = (state.diffBase || (data.diff && data.diff.base.id) || '');
    const map = {
      leaderboard: `score ${r}`,
      documents: `export ${r}`,
      diff: `compare ${base} ${r}`,
      failures: `export ${r}`,
      analyze: `analyze ${r}`,
    };
    return `
    <div style="background:var(--panel); border-bottom:1px solid var(--line);">
      <div style="max-width:1280px; margin:0 auto; padding:9px 22px; display:flex; align-items:center; gap:10px;">
        <span style="color:var(--fg4); font-size:11px;">$</span>
        <code style="font-size:11.5px; color:var(--fg2);"><span style="color:var(--ac);">ezpz</span> ${esc(map[state.view] || '')}</code>
        <span style="margin-left:auto; font-size:10.5px; color:var(--fg4);">reads SQLite · 0 API calls</span>
      </div>
    </div>`;
  }

  // ===================== LEADERBOARD =====================
  function leaderboardView() {
    const lb = data.leaderboard || {};
    const board = (lb.board || []).slice().sort((a, b) => b.accuracy - a.accuracy);
    const dom = lb.domain || { lo0: 0, hi0: 1 };
    const R = (dom.hi0 - dom.lo0) || 1;
    const minCost = Math.min(...board.filter(b => b.docs).map(b => b.cost_usd / Math.max(1, b.docs)), Infinity);
    const halC = h => h <= 2 ? v('cor') : h <= 5 ? v('mi') : v('wr');
    const misC = m => m <= 14 ? v('cor') : m <= 22 ? v('mi') : v('wr');

    const slices = (lb.slices || [{ id: 'all', label: 'all', n: 0 }]).map(s => {
      const on = state.slice === s.id;
      return `<button onclick="App.setSlice('${s.id}')" style="background:${on ? v('acD') : 'transparent'}; color:${on ? v('acT') : v('fg3')}; border:1px solid ${on ? v('acL') : v('line')}; border-radius:4px; padding:5px 10px; font-size:11px; cursor:pointer;">${esc(s.label)} <span style="opacity:.6;">${s.n}</span></button>`;
    }).join('');

    const rows = board.map((b, i) => {
      const lo = b.ci_low, hi = b.ci_high, acc = b.accuracy;
      const ciHalf = ((hi - lo) / 2 * 100).toFixed(1);
      const ciLeft = (lo - dom.lo0) / R * 100, ciW = (hi - lo) / R * 100, ciC = (acc - dom.lo0) / R * 100;
      const perDoc = b.docs ? b.cost_usd / b.docs : 0;
      const dot = i === 0 ? v('cor') : i < 3 ? v('ac') : v('fg4');
      const barColor = i === 0 ? v('cor') : v('ac');
      const errColor = b.errors === 0 ? v('fg3') : b.errors > 2 ? v('wr') : v('fg2');
      const costColor = perDoc <= minCost ? v('cor') : v('fg2');
      return `
      <div style="display:grid; grid-template-columns:210px 1fr 56px 56px 80px 64px 60px; gap:0 12px; align-items:center; padding:13px 18px; border-bottom:1px solid var(--line2); background:${i === 0 ? v('acD') : 'transparent'};">
        <div style="min-width:0;">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="color:var(--fg4); font-size:11px; width:12px; font-variant-numeric:tabular-nums;">${i + 1}</span>
            <span style="width:5px; height:5px; border-radius:50%; background:${dot}; flex:none;"></span>
            <span style="color:var(--fg); font-size:12.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(b.pipeline)}</span>
            ${b.strategy ? `<span style="font-size:8.5px; font-weight:600; letter-spacing:.05em; padding:1px 5px; border-radius:3px; background:var(--haD); color:var(--ha); flex:none;">STRAT</span>` : ''}
          </div>
          <div style="color:var(--fg4); font-size:10px; margin-left:25px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(b.cfg)}</div>
        </div>
        <div>
          <div style="display:flex; align-items:baseline; gap:7px; margin-bottom:5px;">
            <span style="color:var(--fg); font-size:14px; font-weight:600; font-variant-numeric:tabular-nums;">${pct1(acc)}<span style="color:var(--fg3); font-weight:400; font-size:11px;">%</span></span>
            <span style="color:var(--fg3); font-size:10px; font-variant-numeric:tabular-nums;">±${ciHalf}</span>
            <span style="color:var(--fg4); font-size:10px; font-variant-numeric:tabular-nums;">macro ${pct1(b.accuracy_macro)}</span>
          </div>
          <div style="position:relative; height:5px; background:var(--panel2); border-radius:3px;">
            <div style="position:absolute; top:0; bottom:0; left:${ciLeft}%; width:${ciW}%; background:${barColor}; opacity:.3; border-radius:3px;"></div>
            <div style="position:absolute; top:-2px; height:9px; width:2px; left:${ciC}%; background:${barColor}; border-radius:1px;"></div>
          </div>
        </div>
        <div style="text-align:right; font-variant-numeric:tabular-nums; font-size:12.5px; color:${halC(b.hallucinations)};">${b.hallucinations}</div>
        <div style="text-align:right; font-variant-numeric:tabular-nums; font-size:12.5px; color:${misC(b.missed)};">${b.missed}</div>
        <div style="text-align:right; font-variant-numeric:tabular-nums; font-size:12px; color:${costColor};">$${perDoc.toFixed(3)}</div>
        <div style="text-align:right; font-variant-numeric:tabular-nums; font-size:12px; color:var(--fg2);">${(b.latency_p50 / 1000).toFixed(1)}s</div>
        <div style="text-align:right; font-variant-numeric:tabular-nums; font-size:12px; color:${errColor};">${b.errors}</div>
      </div>`;
    }).join('');

    const p = lb.paired || {};
    return `
    <div>
      <div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:16px;">
        <div>
          <h1 style="margin:0; font-size:17px; font-weight:600; color:var(--fg);">Leaderboard</h1>
          <p style="margin:4px 0 0; font-size:11.5px; color:var(--fg3);">${esc(lb.sliceMeta || '')} · micro-accuracy with 95% bootstrap CI</p>
        </div>
        <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end;">${slices}</div>
      </div>
      <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden;">
        <div style="display:grid; grid-template-columns:210px 1fr 56px 56px 80px 64px 60px; gap:0 12px; padding:11px 18px; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--fg3); border-bottom:1px solid var(--line);">
          <div>pipeline</div><div>accuracy · 95% ci</div><div style="text-align:right;">hal</div><div style="text-align:right;">miss</div><div style="text-align:right;">$/doc</div><div style="text-align:right;">p50</div><div style="text-align:right;">err</div>
        </div>
        ${rows || emptyRow('no scored pipelines in this run')}
        <div style="display:flex; align-items:center; gap:16px; padding:11px 18px; font-size:10px; color:var(--fg3);">
          <span><span style="color:var(--cor);">●</span> correct</span>
          <span><span style="color:var(--wr);">●</span> wrong</span>
          <span><span style="color:var(--mi);">●</span> missing</span>
          <span><span style="color:var(--ha);">●</span> hallucinated</span>
          <span style="margin-left:auto; color:var(--fg4);">paired: ${esc(p.lead || '—')} ${esc(p.by || '')} → <span style="color:${p.significant ? v('cor') : v('mi')};">${esc(p.verdict || 'n/a')}</span></span>
        </div>
      </div>
      ${fieldHeatmap()}
    </div>`;
  }

  function accCellColor(a) { return a >= 0.9 ? v('cor') : a >= 0.75 ? v('mi') : v('wr'); }

  function fieldHeatmap() {
    const fb = data.fields;
    if (!fb || !fb.fields || !fb.fields.length) return '';
    const pipes = fb.pipelines;
    const cols = `160px repeat(${pipes.length}, minmax(72px, 1fr))`;
    const head = pipes.map(p => `<div style="padding:8px 6px; font-size:10px; color:var(--fg3); text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-left:1px solid var(--line2);">${esc(p.label)}</div>`).join('');
    const rows = fb.fields.map(f => {
      const cells = pipes.map(p => {
        const a = f.cells[p.pipeline_id];
        if (a == null) return `<div style="padding:9px 6px; text-align:center; font-size:11px; color:var(--fg4); border-left:1px solid var(--line2);">—</div>`;
        const c = accCellColor(a);
        return `<div style="padding:9px 6px; text-align:center; font-size:11px; font-variant-numeric:tabular-nums; color:${a >= 0.75 ? 'var(--fg)' : v('wr')}; background:color-mix(in oklch, ${c} ${Math.round(18 + a * 18)}%, transparent); border-left:1px solid var(--line2);">${pct0(a)}%</div>`;
      }).join('');
      return `<div style="display:grid; grid-template-columns:${cols}; border-bottom:1px solid var(--line2);">
        <div style="padding:9px 12px; min-width:0;"><span style="font-size:11px; color:var(--fg);">${esc(f.field)}</span> <span style="font-size:9px; color:var(--fg4);">${esc(f.type)}</span></div>
        ${cells}
      </div>`;
    }).join('');
    return `
    <div style="margin-top:14px; background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden;">
      <div style="display:flex; align-items:baseline; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line);">
        <span style="font-size:12.5px; font-weight:600; color:var(--fg);">Per-field accuracy</span>
        <span style="font-size:10.5px; color:var(--fg3);">where each pipeline wins or struggles · micro-accuracy per field</span>
      </div>
      <div style="overflow-x:auto;"><div style="min-width:${160 + pipes.length * 72}px;">
        <div style="display:grid; grid-template-columns:${cols}; border-bottom:1px solid var(--line);">
          <div style="padding:8px 12px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--fg3);">field</div>
          ${head}
        </div>
        ${rows}
      </div></div>
    </div>`;
  }

  // ===================== DOCUMENTS =====================
  function documentsView() {
    const docs = (data.documents && data.documents.docs) || [];
    const accColor = a => a >= .9 ? v('cor') : a >= .82 ? v('mi') : v('wr');
    const docList = docs.map(d => {
      const sel = d.doc_id === state.selectedDoc;
      const tags = (d.tags || []).map(t => `<span style="font-size:8.5px; color:var(--fg3); background:var(--panel2); border-radius:3px; padding:1px 5px;">${esc(t)}</span>`).join('');
      return `<div onclick="App.selectDoc('${d.doc_id}')" style="padding:10px 13px; border-bottom:1px solid var(--line2); cursor:pointer; background:${sel ? v('acD') : 'transparent'}; border-left:2px solid ${sel ? v('ac') : 'transparent'};">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:6px;">
          <span style="font-size:11.5px; color:${sel ? v('fg') : v('fg2')}; font-weight:${sel ? 600 : 400}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(d.slug)}</span>
        </div>
        <div style="display:flex; align-items:center; gap:5px; margin-top:6px;">
          <div style="flex:1; height:3px; background:var(--panel2); border-radius:2px; overflow:hidden;"><div style="height:100%; width:${d.accuracy * 100}%; background:${accColor(d.accuracy)};"></div></div>
          <span style="font-size:9.5px; color:var(--fg3); font-variant-numeric:tabular-nums;">${pct0(d.accuracy)}%</span>
        </div>
        ${tags ? `<div style="display:flex; gap:4px; margin-top:6px; flex-wrap:wrap;">${tags}</div>` : ''}
      </div>`;
    }).join('');

    const doc = data.doc;
    const cm = caseMap();
    let grid = emptyRow('select a document');
    let headers = '';
    let docName = '—', docSummary = '';
    if (doc) {
      docName = doc.doc.slug; docSummary = doc.doc.summary;
      headers = doc.pipelines.map(h => `<div style="padding:9px 10px; border-left:1px solid var(--line2);"><div style="font-size:11px; color:var(--fg2); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(h.label)}</div><div style="font-size:8.5px; color:var(--fg4); margin-top:1px;">${esc(h.cap)}</div></div>`).join('');
      grid = doc.fields.map(f => {
        const sel = state.selectedField === f.field;
        const gtPresent = f.gt_kind === 'present';
        const cells = doc.pipelines.map(p => {
          const c = f.cells[p.pipeline_id] || { value: '—', status: 'unscored' };
          const m = cm[c.status] || cm.unscored;
          let display = c.value;
          if (c.status === 'missing') display = 'missing';
          else if (c.status === 'absent_ok') display = 'absent';
          else if (c.status === 'parse_error') display = 'uncanonicalizable';
          else if (c.status === 'not_labeled') display = 'not labeled';
          const empty = c.value === '—' || c.status === 'missing' || c.status === 'absent_ok' || c.status === 'not_labeled';
          const conf = c.confidence != null ? c.confidence.toFixed(2) : (c.provenance ? 'bbox' : '');
          return `<div style="padding:9px 10px; border-left:1px solid var(--line2); background:${m.bg}; min-width:0; box-shadow:inset 2px 0 0 ${m.bg === 'transparent' ? 'transparent' : m.fg};">
            <div style="display:flex; align-items:center; gap:5px;">
              <span style="font-size:10px; color:${m.fg}; flex:none;">${m.glyph}</span>
              <span style="font-size:11px; color:${empty ? v('fg4') : v('fg')}; font-style:${empty ? 'italic' : 'normal'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(display)}</span>
            </div>
            <div style="font-size:8.5px; color:var(--fg4); margin-top:3px; margin-left:15px;">${esc(conf)}</div>
          </div>`;
        }).join('');
        return `<div onclick="App.selectField('${esc(f.field)}')" style="display:grid; grid-template-columns:128px 108px repeat(${doc.pipelines.length}, minmax(92px,1fr)); border-bottom:1px solid var(--line2); cursor:pointer; background:${sel ? v('acD') : 'transparent'};">
          <div style="padding:10px 12px; min-width:0;"><div style="font-size:11px; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(f.field)}</div><div style="font-size:9px; color:var(--fg4);">${esc(f.type)}</div></div>
          <div style="padding:10px 10px; border-left:1px solid var(--line2); font-size:11px; color:${gtPresent ? v('fg2') : v('fg4')}; font-style:${gtPresent ? 'normal' : 'italic'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(f.gt)}</div>
          ${cells}
        </div>`;
      }).join('');
    }

    return `
    <div>
      <div style="margin-bottom:16px;">
        <h1 style="margin:0; font-size:17px; font-weight:600; color:var(--fg);">Per-document drill-down</h1>
        <p style="margin:4px 0 0; font-size:11.5px; color:var(--fg3);">predicted value vs ground truth, one column per pipeline, color-coded by score case</p>
      </div>
      <div style="display:grid; grid-template-columns:208px 1fr 248px; gap:14px; align-items:start;">
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden;">
          <div style="padding:10px 13px; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--fg3); border-bottom:1px solid var(--line);">documents · ${docs.length}</div>
          <div style="max-height:560px; overflow-y:auto;">${docList || emptyRow('no documents')}</div>
        </div>
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden;">
          <div style="display:flex; align-items:baseline; justify-content:space-between; gap:14px; padding:11px 14px; border-bottom:1px solid var(--line);">
            <span style="font-size:12.5px; color:var(--fg); font-weight:600; white-space:nowrap;">${esc(docName)}</span>
            <span style="font-size:10.5px; color:var(--fg3); white-space:nowrap;">${esc(docSummary)}</span>
          </div>
          <div style="overflow-x:auto;"><div style="min-width:540px;">
            <div style="display:grid; grid-template-columns:128px 108px repeat(${doc ? doc.pipelines.length : 1}, minmax(92px,1fr)); border-bottom:1px solid var(--line);">
              <div style="padding:9px 12px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--fg3);">field</div>
              <div style="padding:9px 10px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--fg3); border-left:1px solid var(--line2);">ground truth</div>
              ${headers}
            </div>
            ${grid}
          </div></div>
        </div>
        ${sourcePanel(doc)}
      </div>
      <div style="display:flex; gap:18px; margin-top:14px; padding:11px 14px; background:var(--panel); border:1px solid var(--line); border-radius:8px; font-size:10.5px; color:var(--fg3); flex-wrap:wrap;">
        <span style="color:var(--fg4); text-transform:uppercase; letter-spacing:.05em; font-size:9.5px;">score cases:</span>
        <span><span style="color:var(--cor);">✓</span> correct</span>
        <span><span style="color:var(--wr);">✗</span> wrong</span>
        <span><span style="color:var(--mi);">⊘</span> missing</span>
        <span><span style="color:var(--cor);">∅</span> absent_ok</span>
        <span><span style="color:var(--ha);">⚠</span> hallucinated</span>
        <span><span style="color:var(--pa);">⌀</span> parse_error</span>
        <span><span style="color:var(--nl);">–</span> not_labeled</span>
      </div>
    </div>`;
  }

  function sourcePanel(doc) {
    let body = `<div style="color:var(--fg4); font-size:10.5px; line-height:1.6;">Click a field row to trace its source.</div>`;
    let pageLabel = 'page 1';
    if (doc) {
      const dd = doc.doc;
      pageLabel = dd.pages > 1 ? `page 1 / ${dd.pages}` : 'page 1';
      // provenance for the selected field (first emitting cell)
      let selProv = null;
      if (state.selectedField) {
        const f = doc.fields.find(x => x.field === state.selectedField);
        selProv = f ? Object.values(f.cells).map(c => c.provenance).find(Boolean) || null : null;
      }
      let prov = '';
      if (state.selectedField) {
        prov = selProv
          ? `<div style="margin-top:10px; font-size:10px; color:var(--fg3); line-height:1.6;"><span style="color:var(--ac);">${esc(state.selectedField)}</span> provenance — ${selProv.page != null ? 'page ' + selProv.page + ' · ' : ''}${selProv.bbox ? 'bbox [' + selProv.bbox.map(n => (+n).toFixed(2)).join(', ') + ']' : ''}${selProv.text_span ? '“' + esc(String(selProv.text_span).slice(0, 60)) + '”' : ''}</div>`
          : `<div style="margin-top:10px; font-size:10px; color:var(--fg4); line-height:1.6;">No provenance for <span style="color:var(--fg3);">${esc(state.selectedField)}</span> — shown for adapters that emit it.</div>`;
      }
      let page;
      if (dd.is_image) {
        // real document image + bbox overlay (bbox treated as normalized 0..1 fractions of the page)
        let box = '';
        if (selProv && selProv.bbox && selProv.bbox.length === 4) {
          const [x0, y0, x1, y1] = selProv.bbox.map(Number);
          box = `<div style="position:absolute; left:${x0 * 100}%; top:${y0 * 100}%; width:${(x1 - x0) * 100}%; height:${(y1 - y0) * 100}%; border:1.5px solid var(--ac); background:var(--acD); border-radius:2px;"><span style="position:absolute; top:-15px; left:0; font-size:8.5px; color:var(--acT); white-space:nowrap;">${esc(state.selectedField)}</span></div>`;
        }
        page = `<div style="position:relative; line-height:0;"><img src="/api/source?run=${encodeURIComponent(doc.run)}&doc=${encodeURIComponent(dd.doc_id)}" style="width:100%; border-radius:3px; display:block;">${box}</div>`;
      } else if (dd.source_text) {
        let shown = esc(dd.source_text);
        const span = selProv && selProv.text_span;
        if (span) { const e = esc(span); shown = shown.split(e).join('<mark>' + e + '</mark>'); }
        page = `<pre style="margin:0; white-space:pre-wrap; word-break:break-word; font-size:10px; line-height:1.55; color:var(--fg2); font-family:inherit; max-height:380px; overflow:auto;">${shown}</pre>`;
      } else {
        page = `<div style="display:flex; flex-direction:column; gap:9px;">
          <div style="height:11px; width:55%; background:var(--line); border-radius:2px;"></div>
          <div style="height:7px; width:38%; background:var(--line2); border-radius:2px;"></div>
          <div style="margin-top:10px; font-size:10px; color:var(--fg4);">source preview unavailable (non-text or missing file)</div>
        </div>`;
      }
      body = `<div style="background:var(--bg); border:1px solid var(--line); border-radius:3px; padding:12px;">${page}</div>${prov}`;
    }
    return `
    <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; position:sticky; top:120px;">
      <div style="padding:10px 13px; border-bottom:1px solid var(--line); font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--fg3); display:flex; justify-content:space-between;"><span>source</span><span style="color:var(--fg4);">${pageLabel}</span></div>
      <div style="padding:14px;">${body}</div>
    </div>`;
  }

  // ===================== RUN DIFF =====================
  function diffView() {
    const d = data.diff;
    if (!d) return emptyPanel('loading…');
    const cm = caseMap();
    const filters = [['all', 'all ' + (d.improved + d.regressed)], ['improved', 'improved ' + d.improved], ['regressed', 'regressed ' + d.regressed]].map(([id, label]) => {
      const on = state.diffFilter === id;
      return `<button onclick="App.setDiffFilter('${id}')" style="background:${on ? v('acD') : 'transparent'}; color:${on ? v('acT') : v('fg3')}; border:1px solid ${on ? v('acL') : v('line')}; border-radius:4px; padding:5px 11px; font-size:11px; cursor:pointer;">${esc(label)}</button>`;
    }).join('');
    // base picker: other runs on the same dataset × task as the current (compare) run
    const cur = curRun();
    const candidates = (runMeta.runs || []).filter(rr => rr.id !== d.cmp.id && rr.ds === cur.ds && rr.task === cur.task);
    const baseOptions = candidates.length
      ? candidates.map(rr => `<option value="${rr.id}" ${rr.id === d.base.id ? 'selected' : ''}>${esc(rr.id.slice(0, 7))} · ${pct1(rr.acc)}% · ${esc(rr.ago)}</option>`).join('')
      : `<option value="${d.base.id}" selected>${esc(d.base.id.slice(0, 7))}</option>`;
    const rows = d.rows.filter(r => state.diffFilter === 'all' || r.dir === state.diffFilter).slice(0, 200).map(r => {
      const isImp = r.dir === 'improved';
      const fromM = cm[r.from_case], toM = cm[r.to_case];
      return `<div style="display:grid; grid-template-columns:24px 170px 150px 150px 1fr; gap:0 12px; align-items:center; padding:11px 16px; border-bottom:1px solid var(--line2);">
        <div style="color:${isImp ? v('cor') : v('wr')}; font-size:14px;">${isImp ? '↑' : '↓'}</div>
        <div style="font-size:11px; color:var(--fg2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(r.doc)}</div>
        <div style="font-size:11px; color:var(--fg);">${esc(r.field)}</div>
        <div style="font-size:11px; color:var(--fg3);">${esc(r.pipe)}</div>
        <div style="display:flex; align-items:center; gap:8px; font-size:11px; min-width:0;">
          <span style="color:${fromM.fg}; background:${fromM.bg}; padding:1px 6px; border-radius:3px; white-space:nowrap;">${esc(r.from_case)}</span>
          <span style="color:var(--fg4);">→</span>
          <span style="color:${toM.fg}; background:${toM.bg}; padding:1px 6px; border-radius:3px; white-space:nowrap;">${esc(r.to_case)}</span>
        </div>
      </div>`;
    }).join('');
    return `
    <div>
      <div style="margin-bottom:16px;"><h1 style="margin:0; font-size:17px; font-weight:600; color:var(--fg);">Run diff</h1><p style="margin:4px 0 0; font-size:11.5px; color:var(--fg3);">field-scores that changed between two runs of the same dataset × task</p></div>
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:9px 13px;"><div style="font-size:9.5px; color:var(--fg4); text-transform:uppercase; letter-spacing:.05em;">base</div><select onchange="App.setDiffBase(this.value)" style="margin-top:2px; background:var(--panel2); color:var(--fg2); border:1px solid var(--line); border-radius:4px; padding:3px 6px; font-family:inherit; font-size:12px; cursor:pointer;">${baseOptions}</select></div>
        <span style="color:var(--fg4);">→</span>
        <div style="background:var(--panel); border:1px solid var(--acL); border-radius:6px; padding:9px 13px;"><div style="font-size:9.5px; color:var(--fg4); text-transform:uppercase; letter-spacing:.05em;">compare</div><div style="font-size:12px; color:var(--ac);">${esc(d.cmp.id.slice(0, 7))} <span style="color:var(--fg4);">· ${esc(d.cmp.note)}</span></div></div>
        <div style="margin-left:auto; display:flex; gap:14px;">
          <div style="text-align:right;"><div style="font-size:18px; font-weight:600; color:var(--cor); font-variant-numeric:tabular-nums;">+${d.improved}</div><div style="font-size:9.5px; color:var(--fg3);">fail → pass</div></div>
          <div style="text-align:right;"><div style="font-size:18px; font-weight:600; color:var(--wr); font-variant-numeric:tabular-nums;">−${d.regressed}</div><div style="font-size:9.5px; color:var(--fg3);">pass → fail</div></div>
          <div style="text-align:right;"><div style="font-size:18px; font-weight:600; color:var(--fg); font-variant-numeric:tabular-nums;">${esc(d.net)}</div><div style="font-size:9.5px; color:var(--fg3);">net</div></div>
        </div>
      </div>
      <div style="display:flex; gap:5px; margin-bottom:12px;">${filters}</div>
      <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden;">
        <div style="display:grid; grid-template-columns:24px 170px 150px 150px 1fr; gap:0 12px; padding:9px 16px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--fg3); border-bottom:1px solid var(--line);"><div></div><div>document</div><div>field</div><div>pipeline</div><div>change</div></div>
        ${rows || emptyRow('no changes — runs agree on every shared cell')}
      </div>
    </div>`;
  }

  // ===================== FAILURES =====================
  function failuresView() {
    const fr = data.failures;
    if (!fr) return emptyPanel('loading…');
    const cm = caseMap();
    const chipDefs = [['all', 'all'], ['wrong', 'wrong'], ['missing', 'missing'], ['hallucinated', 'hallucinated'], ['parse_error', 'parse_error']];
    const chips = chipDefs.map(([id, label]) => {
      const active = state.failCase === id;
      const m = cm[id] || { fg: v('ac') };
      const count = id === 'all' ? fr.total : (fr.counts[id] || 0);
      return `<button onclick="App.setFailCase('${id}')" style="display:flex; align-items:center; gap:7px; background:${active ? v('panel2') : 'transparent'}; color:${active ? v('fg') : v('fg2')}; border:1px solid ${active ? (id === 'all' ? v('line') : m.fg) : v('line')}; border-radius:5px; padding:6px 11px; font-size:11px; cursor:pointer;"><span style="color:${id === 'all' ? v('fg3') : m.fg};">●</span>${label}<span style="font-variant-numeric:tabular-nums; opacity:.7; font-weight:600;">${count}</span></button>`;
    }).join('');
    const rows = fr.rows.filter(f => state.failCase === 'all' || f.case === state.failCase).slice(0, 300).map(f => {
      const m = cm[f.case] || cm.wrong;
      const empty = f.predicted === '—';
      return `<div style="display:grid; grid-template-columns:150px 130px 130px 110px 1fr 1fr; gap:0 12px; align-items:center; padding:10px 16px; border-bottom:1px solid var(--line2);">
        <div style="font-size:11px; color:var(--fg3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(f.doc)}</div>
        <div style="font-size:11px; color:var(--fg);">${esc(f.field)}</div>
        <div style="font-size:11px; color:var(--fg2);">${esc(f.pipe)}</div>
        <div><span style="font-size:10px; color:${m.fg}; background:${m.bg}; padding:2px 7px; border-radius:3px; white-space:nowrap;">${esc(f.case)}</span></div>
        <div style="font-size:11px; color:${empty ? v('fg4') : v('fg')}; font-style:${empty ? 'italic' : 'normal'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(f.predicted)}</div>
        <div style="font-size:11px; color:var(--fg2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(f.expected)} <span style="color:var(--fg4); font-size:9.5px;">· ${esc(f.scorer)}</span></div>
      </div>`;
    }).join('');
    return `
    <div>
      <div style="margin-bottom:16px;"><h1 style="margin:0; font-size:17px; font-weight:600; color:var(--fg);">Failure explorer</h1><p style="margin:4px 0 0; font-size:11.5px; color:var(--fg3);">every non-passing field-score in run ${esc((state.runId || '').slice(0, 7))} · ${fr.total} total</p></div>
      <div style="display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;">${chips}</div>
      <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden;">
        <div style="display:grid; grid-template-columns:150px 130px 130px 110px 1fr 1fr; gap:0 12px; padding:9px 16px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--fg3); border-bottom:1px solid var(--line);"><div>document</div><div>field</div><div>pipeline</div><div>case</div><div>predicted</div><div>expected</div></div>
        <div style="max-height:560px; overflow-y:auto;">${rows || emptyRow('no failures 🎉')}</div>
      </div>
    </div>`;
  }

  // ===================== ANALYZE =====================
  function costScatter() {
    const pts = (data.cost && data.cost.points) || [];
    if (!pts.length) return '';
    const W = 560, H = 300, padL = 50, padR = 120, padT = 16, padB = 36;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const maxCost = Math.max(...pts.map(p => p.cost_per_doc), 0);
    const xMax = maxCost > 0 ? maxCost * 1.15 : 1;
    const accs = pts.map(p => p.accuracy);
    let yMin = Math.max(0, Math.min(...accs) - 0.05), yMax = Math.min(1, Math.max(...accs) + 0.03);
    if (yMax - yMin < 0.05) { yMin = Math.max(0, yMin - 0.05); yMax = Math.min(1, yMax + 0.05); }
    const X = c => padL + (xMax ? c / xMax : 0) * plotW;
    const Y = a => padT + (1 - (a - yMin) / (yMax - yMin)) * plotH;

    // axes + a few ticks
    const yticks = [yMin, (yMin + yMax) / 2, yMax].map(t =>
      `<line x1="${padL}" y1="${Y(t).toFixed(1)}" x2="${padL + plotW}" y2="${Y(t).toFixed(1)}" stroke="var(--line2)" stroke-width="1"/>` +
      `<text x="${padL - 6}" y="${(Y(t) + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--fg4)">${pct0(t)}%</text>`).join('');
    const xticks = [0, xMax / 2, xMax].map(t =>
      `<text x="${X(t).toFixed(1)}" y="${H - padB + 16}" text-anchor="middle" font-size="9" fill="var(--fg4)">$${t.toFixed(3)}</text>`).join('');

    const frontier = pts.filter(p => p.pareto).sort((a, b) => a.cost_per_doc - b.cost_per_doc);
    const fline = frontier.length > 1
      ? `<polyline points="${frontier.map(p => `${X(p.cost_per_doc).toFixed(1)},${Y(p.accuracy).toFixed(1)}`).join(' ')}" fill="none" stroke="var(--cor)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>`
      : '';
    const dots = pts.map(p => {
      const cx = X(p.cost_per_doc), cy = Y(p.accuracy);
      const col = p.pareto ? v('cor') : v('ac');
      return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${p.pareto ? 6 : 4.5}" fill="${col}" fill-opacity="${p.pareto ? 0.9 : 0.5}" stroke="${col}" stroke-width="1.5"/>` +
        `<text x="${(cx + 9).toFixed(1)}" y="${(cy + 3).toFixed(1)}" font-size="9.5" fill="var(--fg2)">${esc(p.label)}${p.pareto ? ' ★' : ''}</text>`;
    }).join('');

    return `
    <div style="margin-bottom:16px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px;">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px;">
        <span style="font-size:13px; font-weight:600; color:var(--fg);">Cost vs accuracy</span>
        <span style="font-size:10.5px; color:var(--fg3);"><span style="color:var(--cor);">★</span> Pareto frontier — most accuracy per dollar</span>
      </div>
      <p style="margin:0 0 8px; font-size:11px; color:var(--fg3);">each point is a pipeline; a starred point is one no other beats on both cost and accuracy</p>
      <svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px; font-family:inherit;">
        <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + plotH}" stroke="var(--line)" stroke-width="1"/>
        <line x1="${padL}" y1="${padT + plotH}" x2="${padL + plotW}" y2="${padT + plotH}" stroke="var(--line)" stroke-width="1"/>
        ${yticks}${xticks}${fline}${dots}
        <text x="${padL + plotW / 2}" y="${H - 2}" text-anchor="middle" font-size="9.5" fill="var(--fg3)">cost / doc ($)</text>
        <text x="12" y="${padT + plotH / 2}" text-anchor="middle" font-size="9.5" fill="var(--fg3)" transform="rotate(-90 12 ${padT + plotH / 2})">accuracy</text>
      </svg>
    </div>`;
  }

  function analyzeView() {
    const a = data.analyze;
    if (!a) return emptyPanel('loading…');
    const bins = a.calBins || [];
    let calChart;
    if (bins.length) {
      const bars = bins.map(b => {
        const mid = (b.lo + b.hi) / 2;
        const refH = mid * 100;
        return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; position:relative;">
          <span style="font-size:10px; color:var(--fg2); font-variant-numeric:tabular-nums; margin-bottom:5px;">${pct0(b.accuracy)}</span>
          <div style="width:100%; height:${b.accuracy * 100}%; background:linear-gradient(var(--ac), var(--acD)); border-radius:3px 3px 0 0; position:relative;"><div style="position:absolute; left:0; right:0; bottom:${refH}%; height:1.5px; background:var(--mi); opacity:.7;"></div></div>
        </div>`;
      }).join('');
      const labels = bins.map(b => `<div style="flex:1; text-align:center; font-size:9px; color:var(--fg4);">${b.lo.toFixed(1)}–${b.hi.toFixed(1)}<br>n=${b.n}</div>`).join('');
      const best = bins[bins.length - 1];
      calChart = `
        <div style="display:flex; align-items:flex-end; gap:14px; height:160px; padding:0 6px; border-bottom:1px solid var(--line); margin-bottom:8px;">${bars}</div>
        <div style="display:flex; gap:14px; padding:0 6px;">${labels}</div>
        <div style="display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line2);">
          <div style="flex:1; background:var(--panel2); border-radius:5px; padding:10px 12px;"><div style="font-size:9.5px; color:var(--fg3); text-transform:uppercase; letter-spacing:.05em;">overall</div><div style="font-size:17px; font-weight:600; color:var(--fg); font-variant-numeric:tabular-nums;">${a.overall}%</div></div>
          <div style="flex:1; background:var(--corD); border-radius:5px; padding:10px 12px;"><div style="font-size:9.5px; color:var(--cor); text-transform:uppercase; letter-spacing:.05em;">top conf bin</div><div style="font-size:17px; font-weight:600; color:var(--cor); font-variant-numeric:tabular-nums;">${pct1(best.accuracy)}%</div></div>
          <div style="flex:2; display:flex; align-items:center; font-size:10.5px; color:var(--fg3); padding-left:4px; line-height:1.5;">Bars = accuracy per confidence bin; tick = perfect-calibration reference (bin midpoint).</div>
        </div>`;
    } else {
      calChart = `<div style="padding:30px 8px; text-align:center; color:var(--fg4); font-size:11px;">No confidence emitted by this run's pipelines — calibration needs adapters that report per-field confidence.</div>`;
    }

    const paired = (a.paired || []).map(p => `<div style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line2);">
      <div style="flex:1; font-size:11px; color:var(--fg2);">${esc(p.label)}</div>
      <div style="font-size:13px; font-weight:600; color:var(--cor); font-variant-numeric:tabular-nums;">${esc(p.delta)}</div>
      <div style="font-size:10px; color:var(--fg4); font-variant-numeric:tabular-nums; width:54px; text-align:right;">±${esc(p.ci)}</div>
      <div style="width:96px; text-align:right;"><span style="font-size:9.5px; color:${p.significant ? v('cor') : v('mi')}; background:${p.significant ? v('corD') : v('miD')}; padding:2px 7px; border-radius:3px;">${p.significant ? 'significant' : 'within noise'}</span></div>
    </div>`).join('') || emptyRow('need ≥2 pipelines to compare');

    const strat = (a.strategy || []).map(s => `<div style="margin-bottom:13px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span style="font-size:11px; color:var(--fg2);">${esc(s.label)}</span><span style="font-size:11px; color:var(--fg); font-weight:600; font-variant-numeric:tabular-nums;">${esc(s.pct)}</span></div>
      <div style="height:4px; background:var(--panel2); border-radius:2px; overflow:hidden;"><div style="height:100%; width:${s.w}%; background:var(--ac);"></div></div>
      <div style="font-size:9.5px; color:var(--fg4); margin-top:4px;">${esc(s.note)}</div>
    </div>`).join('') || `<div style="font-size:10.5px; color:var(--fg4); padding:6px 0;">No strategy flags recorded — meta-pipelines (cascade/verify/ensemble) emit these in result extras.</div>`;

    return `
    <div>
      <div style="margin-bottom:16px;"><h1 style="margin:0; font-size:17px; font-weight:600; color:var(--fg);">Analyze</h1><p style="margin:4px 0 0; font-size:11.5px; color:var(--fg3);">cost vs accuracy · calibration · paired comparison · extraction-strategy diagnostics</p></div>
      ${costScatter()}
      <div style="display:grid; grid-template-columns:1.3fr 1fr; gap:16px; align-items:start;">
        <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px;">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;"><span style="font-size:13px; font-weight:600; color:var(--fg);">Confidence calibration</span><span style="font-size:10.5px; color:var(--fg3);">${a.nConf} preds w/ confidence</span></div>
          <p style="margin:0 0 18px; font-size:11px; color:var(--fg3);">accuracy within each predicted-confidence bucket</p>
          ${calChart}
        </div>
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px;">
            <span style="font-size:13px; font-weight:600; color:var(--fg);">Paired comparison</span>
            <p style="margin:4px 0 14px; font-size:11px; color:var(--fg3);">accuracy delta vs the leader on shared docs ± bootstrap CI</p>
            ${paired}
          </div>
          <div style="background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px;">
            <span style="font-size:13px; font-weight:600; color:var(--fg);">Strategy flags</span>
            <p style="margin:4px 0 14px; font-size:11px; color:var(--fg3);">meta-pipeline behavior rates</p>
            ${strat}
          </div>
        </div>
      </div>
    </div>`;
  }

  // ===================== BUDGET MODAL (estimate-only) =====================
  function budgetData() {
    const board = (data.leaderboard && data.leaderboard.board) || [];
    const rows = board.map(b => {
      const per = b.docs ? b.cost_usd / b.docs : 0;
      const est = per * state.sampleN;
      return { name: b.pipeline, per, est };
    });
    const total = rows.reduce((s, r) => s + r.est, 0);
    return { rows, total, over: total > state.budgetCap };
  }
  function runStatusHtml() {
    const j = state.runJob;
    if (!j) return '';
    const map = {
      starting: [v('ac'), v('acD'), '⟳', 'launching…'],
      running: [v('ac'), v('acD'), '⟳', `running ${(j.run_id || '').slice(0, 7)}… ${j.uncached_cells != null ? '· ' + j.uncached_cells + ' uncached cells' : ''}`],
      cancelling: [v('mi'), v('miD'), '⟳', 'cancelling — finishing the in-flight cell…'],
      complete: [v('cor'), v('corD'), '✓', `run ${(j.run_id || '').slice(0, 7)} complete — switching…`],
      cancelled: [v('mi'), v('miD'), '◼', `run ${(j.run_id || '').slice(0, 7)} cancelled — partial results kept`],
      busy: [v('mi'), v('miD'), '⏳', j.error || 'a run is already in progress'],
      refused: [v('wr'), v('wrD'), '✗', 'refused: ' + (j.error || 'over budget')],
      failed: [v('wr'), v('wrD'), '✗', 'failed: ' + (j.error || 'unknown')],
      error: [v('wr'), v('wrD'), '✗', j.error || 'error'],
    };
    const [fg, bg, icon, msg] = map[j.status] || map.error;
    return `<div style="display:flex; align-items:center; gap:9px; padding:9px 12px; border-radius:6px; background:${bg}; border:1px solid ${fg}; margin-bottom:14px;"><span style="font-size:13px; color:${fg};">${icon}</span><span style="font-size:11px; color:${fg};">${esc(msg)}</span></div>`;
  }

  function budgetCompute() {
    const bd = budgetData();
    const rows = bd.rows.map(r => `<div style="display:grid; grid-template-columns:1fr 70px 70px 90px; align-items:center; padding:8px 12px; border-bottom:1px solid var(--line2); font-size:11px;">
      <span style="color:var(--fg2);">${esc(r.name)}</span>
      <span style="color:var(--fg4); text-align:right; font-variant-numeric:tabular-nums;">${state.sampleN}×</span>
      <span style="color:var(--fg4); text-align:right; font-variant-numeric:tabular-nums;">$${r.per.toFixed(3)}</span>
      <span style="text-align:right; font-variant-numeric:tabular-nums; color:${r.est > state.budgetCap ? v('wr') : v('fg2')};">$${r.est.toFixed(2)}</span>
    </div>`).join('') || emptyRow('this run recorded no cost (e.g. the fake adapter)');
    const over = bd.over;
    const running = !!state.runJob && ['starting', 'running', 'cancelling'].includes(state.runJob.status);
    const cmd = `ezpz run <experiment.yaml> --sample ${state.sampleN} --budget-usd ${state.budgetCap}`;
    return `
      <code style="display:block; font-size:11px; color:var(--fg2); background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:9px 11px; margin-bottom:16px;"><span style="color:var(--ac);">ezpz</span> run &lt;experiment.yaml&gt; --sample ${state.sampleN} --budget-usd ${state.budgetCap}</code>
      <div style="border:1px solid var(--line); border-radius:6px; overflow:hidden; margin-bottom:16px;">
        ${rows}
        <div style="display:grid; grid-template-columns:1fr 90px; align-items:center; padding:10px 12px; background:var(--panel2); font-size:12px;"><span style="color:var(--fg2);">estimated total</span><span style="text-align:right; font-weight:600; font-variant-numeric:tabular-nums; color:${over ? v('wr') : v('cor')};">$${bd.total.toFixed(2)}</span></div>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:6px; background:${over ? v('wrD') : v('corD')}; border:1px solid ${over ? v('wr') : v('cor')}; margin-bottom:14px;">
        <span style="font-size:14px; color:${over ? v('wr') : v('cor')};">${over ? '✗' : '✓'}</span>
        <span style="font-size:11px; color:${over ? v('wr') : v('cor')};">${over ? `projected $${bd.total.toFixed(2)} exceeds cap $${state.budgetCap} — the run is refused before any API call` : `projected $${bd.total.toFixed(2)} within $${state.budgetCap} cap, based on this run's observed cost/doc`}</span>
      </div>
      ${runStatusHtml()}
      <div style="display:flex; gap:8px; justify-content:space-between; align-items:center;">
        <span style="font-size:10px; color:var(--fg4);">re-runs this experiment, budget-gated · cached cells are free</span>
        <div style="display:flex; gap:8px;">
          <button onclick="App.closeBudget()" style="background:var(--panel2); color:var(--fg2); border:1px solid var(--line); border-radius:5px; padding:8px 14px; font-size:11.5px; cursor:pointer;">cancel</button>
          <button onclick="App.copyCommand('${esc(cmd)}')" style="background:var(--panel2); color:var(--fg2); border:1px solid var(--line); border-radius:5px; padding:8px 14px; font-size:11.5px; cursor:pointer;" id="copyBtn">copy command</button>
          ${running
            ? `<button onclick="App.cancelRun()" style="background:var(--wrD); color:var(--wr); border:1px solid var(--wr); border-radius:5px; padding:8px 16px; font-size:11.5px; font-weight:600; cursor:pointer;">cancel run</button>`
            : `<button onclick="App.confirmRun()" ${over ? 'disabled' : ''} style="background:${over ? v('panel2') : v('ac')}; color:${over ? v('fg4') : '#fff'}; border:1px solid ${over ? v('line') : v('ac')}; border-radius:5px; padding:8px 16px; font-size:11.5px; font-weight:600; cursor:${over ? 'not-allowed' : 'pointer'};">confirm & run</button>`}
        </div>
      </div>`;
  }
  function budgetModal() {
    if (!state.budgetOpen) return '';
    const r = curRun();
    const maxN = Math.max(10, r.n || 50);
    return `
    <div onclick="App.closeBudget()" style="position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:24px;">
      <div onclick="event.stopPropagation()" style="width:560px; max-width:100%; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.5);">
        <div style="padding:16px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;">
          <div><div style="font-size:13px; font-weight:600; color:var(--fg);">Run experiment — budget estimate</div><div style="font-size:10.5px; color:var(--fg3); margin-top:2px;">projects cost from this run's observed $/doc · estimate-only</div></div>
          <button onclick="App.closeBudget()" style="background:none; border:none; color:var(--fg3); font-size:18px; cursor:pointer;">×</button>
        </div>
        <div style="padding:18px 20px;">
          <div style="display:flex; gap:18px; margin-bottom:18px;">
            <div style="flex:1;"><div style="display:flex; justify-content:space-between; font-size:10.5px; color:var(--fg3); margin-bottom:6px;"><span>sample size</span><span id="sampleLabel" style="color:var(--fg); font-variant-numeric:tabular-nums;">${state.sampleN} docs</span></div><input type="range" min="10" max="${maxN}" step="10" value="${Math.min(state.sampleN, maxN)}" oninput="App.onSample(this.value)" style="width:100%;"></div>
            <div style="flex:1;"><div style="display:flex; justify-content:space-between; font-size:10.5px; color:var(--fg3); margin-bottom:6px;"><span>budget cap</span><span id="capLabel" style="color:var(--fg); font-variant-numeric:tabular-nums;">$${state.budgetCap}.00</span></div><input type="range" min="5" max="60" step="1" value="${state.budgetCap}" oninput="App.onCap(this.value)" style="width:100%;"></div>
          </div>
          <div id="budgetCompute">${budgetCompute()}</div>
        </div>
      </div>
    </div>`;
  }

  // ---- helpers / shell ----
  const emptyRow = msg => `<div style="padding:26px 18px; text-align:center; color:var(--fg4); font-size:11px;">${esc(msg)}</div>`;
  const emptyPanel = msg => `<div style="background:var(--panel); border:1px solid var(--line); border-radius:8px;">${emptyRow(msg)}</div>`;

  function viewBody() {
    if (!state.runId) return emptyPanel('No runs found — run `ezpz run <experiment>` first.');
    switch (state.view) {
      case 'leaderboard': return leaderboardView();
      case 'documents': return documentsView();
      case 'diff': return diffView();
      case 'failures': return failuresView();
      case 'analyze': return analyzeView();
    }
  }
  function render() {
    document.getElementById('root').innerHTML =
      topbar() + cliBar() + `<div style="max-width:1280px; margin:0 auto; padding:22px;">` + viewBody() + `</div>` + budgetModal();
    syncURL();
  }

  function syncURL() {
    // keep view state in the URL so refresh restores it and links are shareable
    const q = new URLSearchParams();
    q.set('view', state.view);
    if (state.runId) q.set('run', state.runId);
    if (state.theme !== 'dark') q.set('theme', state.theme);
    if (state.view === 'leaderboard' && state.slice !== 'all') q.set('slice', state.slice);
    if (state.view === 'documents' && state.selectedDoc) q.set('doc', state.selectedDoc);
    if (state.view === 'failures' && state.failCase !== 'all') q.set('fail', state.failCase);
    if (state.view === 'diff' && state.diffFilter !== 'all') q.set('diff', state.diffFilter);
    history.replaceState(null, '', location.pathname + '?' + q.toString());
  }

  // ---- public handlers ----
  return {
    async init() {
      const q = new URLSearchParams(location.search);
      const views = ['leaderboard', 'documents', 'diff', 'failures', 'analyze'];
      if (views.includes(q.get('view'))) state.view = q.get('view');
      if (['dark', 'light'].includes(q.get('theme'))) state.theme = q.get('theme');
      if (q.get('run')) state.runId = q.get('run');
      if (q.get('slice')) state.slice = q.get('slice');
      if (q.get('doc')) state.selectedDoc = q.get('doc');
      if (q.get('fail')) state.failCase = q.get('fail');
      if (q.get('diff')) state.diffFilter = q.get('diff');
      if (q.get('budget') === '1') state.budgetOpen = true;
      applyTheme(); render(); await loadState(); await loadView();
    },
    toggleTheme() { state.theme = state.theme === 'dark' ? 'light' : 'dark'; applyTheme(); render(); },
    go(view) { state.view = view; state.runMenuOpen = false; render(); loadView(); },
    toggleRunMenu(e) { if (e) e.stopPropagation(); state.runMenuOpen = !state.runMenuOpen; render(); },
    closeRunMenu() { state.runMenuOpen = false; render(); },
    selectRun(id) { state.runId = id; state.runMenuOpen = false; state.selectedDoc = null; state.selectedField = null; state.diffBase = null; render(); loadView(); },
    setSlice(id) { state.slice = id; render(); loadView(); },
    selectDoc(id) { state.selectedDoc = id; state.selectedField = null; render(); loadView(); },
    selectField(f) { state.selectedField = (state.selectedField === f ? null : f); render(); },
    setDiffFilter(id) { state.diffFilter = id; render(); },
    setFailCase(id) { state.failCase = id; render(); },
    openBudget() { state.budgetOpen = true; state.runMenuOpen = false; state.runJob = null; render(); },
    closeBudget() { state.budgetOpen = false; state.runJob = null; render(); },
    async confirmRun() {
      if (budgetData().over || (state.runJob && ['starting', 'running'].includes(state.runJob.status))) return;
      state.runJob = { status: 'starting' };
      patchBudget();
      try {
        const res = await fetch('/api/run', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ run: state.runId, sample: state.sampleN, cap: state.budgetCap }),
        });
        state.runJob = await res.json();
      } catch (e) {
        state.runJob = { status: 'error', error: String(e) };
      }
      patchBudget();
      if (state.runJob.status === 'running') pollRun(state.runJob.run_id);
    },
    async cancelRun() {
      const id = state.runJob && state.runJob.run_id;
      if (!id) return;
      try {
        await fetch('/api/run/cancel', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ run: id }),
        });
        state.runJob = { ...state.runJob, status: 'cancelling' };
      } catch (e) { /* poll will reconcile */ }
      patchBudget();
    },
    onSample(val) { state.sampleN = +val; patchBudget(); },
    onCap(val) { state.budgetCap = +val; patchBudget(); },
    copyCommand(cmd) {
      const text = cmd.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
      navigator.clipboard && navigator.clipboard.writeText(text);
      const btn = document.getElementById('copyBtn');
      if (btn) { btn.textContent = 'copied ✓'; setTimeout(() => { if (btn) btn.textContent = 'copy run command'; }, 1400); }
    },
  };

  function patchBudget() {
    const sl = document.getElementById('sampleLabel'); if (sl) sl.textContent = state.sampleN + ' docs';
    const cl = document.getElementById('capLabel'); if (cl) cl.textContent = '$' + state.budgetCap + '.00';
    const c = document.getElementById('budgetCompute'); if (c) c.innerHTML = budgetCompute();
  }

  function pollRun(runId) {
    const tick = async () => {
      let j;
      try { j = await (await fetch('/api/run_status?run=' + encodeURIComponent(runId))).json(); }
      catch (e) { state.runJob = { status: 'error', error: String(e) }; patchBudget(); return; }
      state.runJob = j;
      if (['running', 'starting', 'cancelling'].includes(j.status)) { patchBudget(); setTimeout(tick, 1000); return; }
      patchBudget();
      if (j.status === 'complete' || j.status === 'cancelled') {
        await loadState();                      // pick up the new run in the switcher
        state.runId = runId; state.selectedDoc = null; state.diffBase = null;
        setTimeout(() => { state.budgetOpen = false; state.runJob = null; render(); loadView(); }, j.status === 'cancelled' ? 1100 : 700);
      }
    };
    setTimeout(tick, 800);
  }
})();
App.init();
</script>
</body>
</html>
